version: 2
updates:
  # Keep npm dependencies patched (Astro, wrangler, fonts, etc.).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      # Batch minor/patch bumps into a single PR to reduce noise.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
  # Keep GitHub Actions versions current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
